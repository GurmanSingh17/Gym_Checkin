<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance Form</title>
    <style>
      :root {
        --bg: #f3f7fc;
        --card: #ffffff;
        --text: #0f2747;
        --muted: #5f7189;
        --line: #d6e0ec;
        --primary: #167f78;
        --primary-dark: #126962;
        --tab-bg: #eef3f9;
        --secondary: #e9eef5;
        --danger: #b42318;
        --shadow: 0 12px 30px rgba(15, 39, 71, 0.08);
        --radius: 24px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
        background: linear-gradient(180deg, #f7faff 0%, #eef4fb 100%);
        font-family: "Segoe UI", Tahoma, sans-serif;
        color: var(--text);
      }

      .card {
        width: min(820px, 100%);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 28px;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 3vw, 2.35rem);
        line-height: 1.1;
      }

      .lead {
        margin: 14px 0 26px;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.55;
      }

      .tabs {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--tab-bg);
        margin-bottom: 28px;
      }

      .tabs-wrap {
        display: flex;
        justify-content: center;
        margin-bottom: 28px;
      }

      .tab {
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 14px 20px;
        border-radius: 14px;
        cursor: pointer;
        font: inherit;
        font-size: 1rem;
        font-weight: 700;
        min-width: 96px;
      }

      .tab.active {
        background: var(--primary);
        color: #ffffff;
      }

      .pane {
        display: none;
      }

      .pane.active {
        display: block;
      }

      .choice-text {
        margin: 0 0 22px;
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--text);
      }

      form {
        display: grid;
        gap: 22px;
      }

      .field {
        display: grid;
        gap: 10px;
        justify-items: center;
      }

      label {
        font-size: 1rem;
        font-weight: 700;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px 16px;
        font: inherit;
        font-size: 1rem;
        color: var(--text);
        outline: none;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
        background: #fff;
      }

      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(22, 127, 120, 0.12);
      }

      input::placeholder {
        color: #7d8ea4;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }

      button[type="submit"],
      .secondary {
        border: 0;
        border-radius: 16px;
        padding: 16px 24px;
        cursor: pointer;
        font: inherit;
        font-size: 1rem;
        font-weight: 700;
      }

      button[type="submit"] {
        min-width: 200px;
        background: var(--primary);
        color: #fff;
      }

      .secondary {
        background: var(--secondary);
        color: var(--text);
        min-width: 94px;
      }

      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .status {
        min-height: 28px;
        margin-top: 18px;
        font-weight: 700;
        font-size: 1rem;
        text-align: center;
      }

      .status.success {
        color: var(--primary-dark);
      }

      .status.error {
        color: var(--danger);
      }

      @media (max-width: 640px) {
        .card {
          padding: 22px 18px;
        }

        .tabs {
          width: 100%;
        }

        .tab {
          flex: 1;
          min-width: 0;
        }

        .actions {
          flex-direction: column;
        }

        button[type="submit"],
        .secondary {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Attendance Form</h1>
      <p class="lead">
        First choose entry or exit. Then fill in the details and save.
      </p>

      <p class="choice-text">Select attendance type</p>

      <div class="tabs-wrap">
        <div class="tabs">
          <button class="tab" type="button" data-tab="entry">Entry</button>
          <button class="tab" type="button" data-tab="exit">Exit</button>
        </div>
      </div>

      <section class="pane" id="pane-entry">
        <form id="entryForm">
          <div class="field">
            <label for="entryName">Member Name</label>
            <input
              id="entryName"
              name="name"
              type="text"
              placeholder="Enter member name"
              required
            />
          </div>

          <div class="field">
            <label for="entryMembership">Membership Number</label>
            <input
              id="entryMembership"
              name="membershipNo"
              type="text"
              placeholder="Enter membership number"
              required
            />
          </div>

          <div class="actions">
            <button type="submit" id="entrySubmit">Save Entry</button>
            <button type="button" class="secondary" id="entryReset">
              Clear
            </button>
          </div>
        </form>
      </section>

      <section class="pane" id="pane-exit">
        <form id="exitForm">
          <div class="field">
            <label for="exitMembership">Membership Number</label>
            <input
              id="exitMembership"
              name="membershipNo"
              type="text"
              placeholder="Enter membership number for exit"
              required
            />
          </div>

          <div class="actions">
            <button type="submit" id="exitSubmit">Save Exit</button>
            <button type="button" class="secondary" id="exitReset">
              Clear
            </button>
          </div>
        </form>
      </section>

      <div id="statusMessage" class="status" aria-live="polite"></div>
    </main>

    <script>
      const APPS_SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbyYf7jWMFBfVS9KTn5z69fHhXF1pOmIGJeiwfEu5kNTYLrFk8bsScBCt4r_o2_--HJw/exec";

      const tabs = document.querySelectorAll(".tab");
      const panes = {
        entry: document.getElementById("pane-entry"),
        exit: document.getElementById("pane-exit"),
      };

      const entryForm = document.getElementById("entryForm");
      const exitForm = document.getElementById("exitForm");
      const entrySubmit = document.getElementById("entrySubmit");
      const exitSubmit = document.getElementById("exitSubmit");
      const statusMessage = document.getElementById("statusMessage");

      function setStatus(message, type) {
        statusMessage.textContent = message;
        statusMessage.className = `status ${type || ""}`.trim();
      }

      function switchTab(tabName) {
        tabs.forEach((button) => {
          button.classList.toggle("active", button.dataset.tab === tabName);
        });

        Object.entries(panes).forEach(([name, pane]) => {
          pane.classList.toggle("active", name === tabName);
        });

        if (tabName === "entry") {
          document.getElementById("entryName").focus();
        } else {
          document.getElementById("exitMembership").focus();
        }

        setStatus("", "");
      }

      async function postData(payload) {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8",
          },
          body: JSON.stringify(payload),
        });

        const data = await response.json();
        if (!response.ok || !data.success) {
          throw new Error(data.message || "Unable to save data.");
        }

        return data;
      }

      entryForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const formData = new FormData(entryForm);
        const name = String(formData.get("name") || "").trim();
        const membershipNo = String(formData.get("membershipNo") || "").trim();

        if (!name || !membershipNo) {
          setStatus(
            "Please enter both member name and membership number.",
            "error",
          );
          return;
        }

        entrySubmit.disabled = true;
        setStatus("Saving entry...", "");

        try {
          const result = await postData({
            action: "entry",
            name,
            membershipNo,
          });
          entryForm.reset();
          setStatus(result.message || "Entry saved successfully.", "success");
        } catch (error) {
          setStatus(error.message || "Entry could not be saved.", "error");
        } finally {
          entrySubmit.disabled = false;
        }
      });

      exitForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const formData = new FormData(exitForm);
        const membershipNo = String(formData.get("membershipNo") || "").trim();

        if (!membershipNo) {
          setStatus("Please enter the membership number for exit.", "error");
          return;
        }

        exitSubmit.disabled = true;
        setStatus("Saving exit...", "");

        try {
          const result = await postData({ action: "exit", membershipNo });
          exitForm.reset();
          setStatus(result.message || "Exit saved successfully.", "success");
        } catch (error) {
          setStatus(error.message || "Exit could not be saved.", "error");
        } finally {
          exitSubmit.disabled = false;
        }
      });

      document.getElementById("entryReset").addEventListener("click", () => {
        entryForm.reset();
        setStatus("", "");
      });

      document.getElementById("exitReset").addEventListener("click", () => {
        exitForm.reset();
        setStatus("", "");
      });

      tabs.forEach((button) => {
        button.addEventListener("click", () => switchTab(button.dataset.tab));
      });

      setStatus("Please choose Entry or Exit to continue.", "");
    </script>
  </body>
</html>
